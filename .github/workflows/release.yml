name: Build and Release Extensions

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install web-ext
        run: |
          echo "Installing web-ext globally..."
          sudo npm install --global web-ext
          
      - name: Prepare manifest files
        run: |
          echo "Creating manifest files..."
          # Create Chrome/Edge manifest
          cat > manifest.chrome.json << EOL
          {
            "manifest_version": 3,
            "name": "GitHub Data Push",
            "version": "${GITHUB_REF#refs/tags/v}",
            "description": "Push data to GitHub repository with customizable templates",
            "permissions": [
              "storage",
              "sidePanel"
            ],
            "host_permissions": [
              "https://api.github.com/*"
            ],
            "action": {
              "default_title": "GitHub Data Push",
              "default_icon": {
                "16": "icons/icon16.png",
                "48": "icons/icon48.png",
                "128": "icons/icon128.png"
              }
            },
            "side_panel": {
              "default_path": "popup.html",
              "default_width": 500
            },
            "icons": {
              "16": "icons/icon16.png",
              "48": "icons/icon48.png",
              "128": "icons/icon128.png"
            },
            "background": {
              "service_worker": "background.js"
            }
          }
          EOL

          # Create Firefox manifest
          cat > manifest.firefox.json << EOL
          {
            "manifest_version": 2,
            "name": "GitHub Data Push",
            "version": "${GITHUB_REF#refs/tags/v}",
            "description": "Push data to GitHub repository with customizable templates",
            "browser_specific_settings": {
              "gecko": {
                "id": "github-data-push@extensions"
              }
            },
            "permissions": [
              "storage",
              "https://api.github.com/*"
            ],
            "sidebar_action": {
              "default_title": "GitHub Data Push",
              "default_panel": "popup.html",
              "default_icon": {
                "16": "icons/icon16.png",
                "48": "icons/icon48.png",
                "128": "icons/icon128.png"
              }
            },
            "icons": {
              "16": "icons/icon16.png",
              "48": "icons/icon48.png",
              "128": "icons/icon128.png"
            },
            "background": {
              "scripts": ["background.js"]
            }
          }
          EOL

      - name: Build Chrome extension
        run: |
          echo "Building Chrome extension..."
          mkdir -p dist/chrome
          cp -r popup.* i18n.js icons styles.css background.js dist/chrome/
          cp manifest.chrome.json dist/chrome/manifest.json
          cd dist/chrome
          zip -r ../chrome.zip .

      - name: Build Firefox extension
        run: |
          echo "Building Firefox extension..."
          mkdir -p dist/firefox
          cp -r popup.* i18n.js icons styles.css background.js dist/firefox/
          cp manifest.firefox.json dist/firefox/manifest.json
          cd dist/firefox
          web-ext build --artifacts-dir ../ --overwrite-dest

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/chrome.zip
            dist/*.xpi
          name: Release ${{ github.ref_name }}
          body: |
            ## GitHub Data Push ${{ github.ref_name }}
            
            ### 🌐 支持的浏览器 / Supported Browsers
            - Chrome/Edge (Manifest V3)
            - Firefox (Manifest V2)
            
            ### 📦 下载说明 / Download Instructions
            
            #### Chrome/Edge:
            1. 下载 `chrome.zip`
            2. 访问 `chrome://extensions`
            3. 开启"开发者模式"
            4. 点击"加载已解压的扩展程序"
            5. 选择解压后的文件夹
            
            #### Firefox:
            1. 下载 `.xpi` 文件
            2. 访问 `about:addons`
            3. 点击齿轮图标，选择"从文件安装附加组件"
            4. 选择下载的 `.xpi` 文件
            
            ### 🌍 支持的语言 / Supported Languages
            - 简体中文 (Chinese Simplified)
            - English
            - 日本語 (Japanese)
            - 한국어 (Korean)
            - Français (French)
            - Deutsch (German)
            - Español (Spanish)
            
            ### 📝 功能特点 / Features
            - ✨ 自定义数据模板
            - 🔄 多语言支持
            - 🔒 安全的 Token 管理
            - 📁 灵活的数据存储
            - 🎨 直观的用户界面
            
            ### 💡 使用提示 / Usage Tips
            1. 首次使用请在设置中配置 GitHub Token
            2. 选择或创建数据模板
            3. 选择目标仓库
            4. 填写并提交数据
            
            ### 🔐 隐私说明 / Privacy Notice
            - Token 仅保存在本地浏览器中
            - 所有数据传输均使用 GitHub API 加密通道 